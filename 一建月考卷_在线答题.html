<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月考一 - 在线答题</title>
<style>
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
.container { max-width: 760px; margin: 0 auto; padding: 20px 16px 60px; }
.header { text-align: center; padding: 40px 0 30px; }
.header .tag { display: inline-block; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 4px 16px; border-radius: 20px; font-size: 13px; margin-bottom: 12px; }
.header h1 { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.header .subtitle { color: var(--text-muted); font-size: 14px; }
.header .rule-box { display: inline-flex; gap: 24px; margin-top: 16px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 10px 20px; font-size: 13px; color: var(--primary-dark); }
.rule-box span { display: flex; align-items: center; gap: 6px; }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #059669; transform: translateY(-1px); }
.btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
.btn-outline:hover { background: #eff6ff; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #dc2626; }
.btn-block { width: 100%; justify-content: center; font-size: 16px; padding: 14px; }
.btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 8px; }
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px; margin-bottom: 16px; border: 1px solid var(--border); }
.progress-section { margin-bottom: 20px; }
.progress-info { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
.progress-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #60a5fa); border-radius: 4px; transition: width .4s ease; }
.progress-fill.complete { background: linear-gradient(90deg, var(--success), #34d399); }
.q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.q-num { background: var(--primary); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
.q-type-tag { font-size: 12px; padding: 2px 10px; border-radius: 12px; font-weight: 500; }
.q-type-tag.single { background: #dbeafe; color: #1d4ed8; }
.q-type-tag.multiple { background: #fef3c7; color: #d97706; }
.q-stem { font-size: 16px; line-height: 1.8; margin-bottom: 20px; color: var(--text); }
.q-stem img { max-width: 100%; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); display: block; }
.q-options { display: flex; flex-direction: column; gap: 10px; }
.opt-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: all .2s; user-select: none; }
.opt-item:hover { border-color: var(--primary); background: #eff6ff; }
.opt-item.selected { border-color: var(--primary); background: #dbeafe; }
.opt-item.correct { border-color: var(--success); background: #d1fae5; }
.opt-item.wrong { border-color: var(--danger); background: #fee2e2; }
.opt-item.disabled { cursor: default; pointer-events: none; }
.opt-radio, .opt-checkbox { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.opt-checkbox { border-radius: 6px; }
.opt-item.selected .opt-radio, .opt-item.selected .opt-checkbox { background: var(--primary); border-color: var(--primary); }
.opt-item.selected .opt-radio::after { content: ''; width: 8px; height: 8px; background: white; border-radius: 50%; }
.opt-item.selected .opt-checkbox::after { content: ''; width: 8px; height: 8px; background: white; border-radius: 2px; }
.opt-label { font-size: 15px; line-height: 1.6; flex: 1; }
.q-hint { font-size: 12px; color: var(--text-muted); margin-top: 12px; text-align: right; }
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.nav-dots { display: flex; gap: 4px; flex-wrap: wrap; max-width: 320px; }
.nav-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); background: white; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; transition: all .15s; color: var(--text-muted); }
.nav-dot.answered { background: var(--primary); border-color: var(--primary); color: white; }
.nav-dot.current { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
.nav-dot.wrong-ans { background: var(--danger); border-color: var(--danger); color: white; }
.nav-dot.correct-ans { background: var(--success); border-color: var(--success); color: white; }
.submit-bar { text-align: center; margin-top: 20px; display: none; }
.submit-bar.show { display: block; }
#result-page { display: none; }
.score-hero { text-align: center; padding: 30px 20px; background: linear-gradient(135deg, #dbeafe, #e0e7ff); border-radius: var(--radius); margin-bottom: 20px; }
.score-num { font-size: 64px; font-weight: 800; color: var(--primary); line-height: 1; }
.score-label { font-size: 16px; color: var(--text-muted); margin-top: 4px; }
.score-bar-wrap { margin: 24px 0; }
.score-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.score-card { text-align: center; padding: 16px; background: var(--bg); border-radius: 10px; border: 1px solid var(--border); }
.score-card .val { font-size: 28px; font-weight: 700; }
.score-card .val.green { color: var(--success); }
.score-card .val.red { color: var(--danger); }
.score-card .lbl { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.result-tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--bg); border-radius: 10px; padding: 4px; }
.tab-btn { flex: 1; padding: 10px; border: none; background: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .2s; color: var(--text-muted); }
.tab-btn.active { background: white; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.wrong-list { display: flex; flex-direction: column; gap: 12px; }
.wrong-item { border: 2px solid var(--border); border-radius: 10px; overflow: hidden; transition: all .2s; }
.wrong-item:hover { border-color: var(--danger); }
.wrong-item-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; background: white; }
.wrong-badge { background: var(--danger); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.wrong-item-title { flex: 1; font-size: 14px; }
.wrong-item-score { font-size: 13px; padding: 2px 8px; border-radius: 8px; font-weight: 500; }
.wrong-item-score.zero { background: #fee2e2; color: var(--danger); }
.wrong-item-score.partial { background: #fef3c7; color: var(--warning); }
.expand-icon { transition: transform .2s; font-size: 12px; color: var(--text-muted); }
.expand-icon.open { transform: rotate(180deg); }
.wrong-detail { display: none; padding: 16px; background: #fafafa; border-top: 1px solid var(--border); }
.wrong-detail.open { display: block; }
.explanation-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 12px; font-size: 14px; line-height: 1.8; color: #92400e; margin-top: 10px; }
.explanation-box strong { color: #b45309; }
.wrong-opt-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; font-size: 14px; }
.wrong-opt-item.is-correct { background: #d1fae5; color: #065f46; }
.wrong-opt-item.is-wrong { background: #fee2e2; color: #991b1b; }
.wrong-opt-item.not-selected { background: #f1f5f9; color: #64748b; }
.retake-section { text-align: center; padding: 20px; margin-top: 16px; }
.answered-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; background: #d1fae5; color: var(--success); border-radius: 20px; font-size: 13px; }
.confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.confirm-overlay.show { display: flex; }
.confirm-box { background: white; border-radius: 16px; padding: 32px; max-width: 360px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.confirm-box h3 { font-size: 18px; margin-bottom: 8px; }
.confirm-box p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
.confirm-btns { display: flex; gap: 12px; }
.confirm-btns .btn { flex: 1; justify-content: center; }
.all-q-card { background: white; border-radius: 10px; border: 1px solid var(--border); padding: 16px; font-size: 14px; }
.all-q-card .q-stem-small { font-size: 14px; margin-bottom: 8px; }
.all-q-result { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.res-opt { padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; }
.res-opt.correct { background: #d1fae5; color: #065f46; }
.res-opt.wrong { background: #fee2e2; color: #991b1b; }
.res-opt.missed { background: #f1f5f9; color: #64748b; }
.all-q-exp { font-size: 13px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px; padding: 8px; color: #92400e; margin-top: 6px; }
.all-q-score { margin-left: auto; font-size: 13px; font-weight: 700; }
.all-q-score.zero { color: var(--danger); }
.all-q-score.full { color: var(--success); }
.all-q-score.partial { color: var(--warning); }
@media (max-width: 480px) {
  .header h1 { font-size: 20px; }
  .rule-box { flex-direction: column; gap: 8px; }
  .nav-dots { max-width: 200px; }
  .score-breakdown { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="container">

  <!-- 开始页 -->
  <div id="start-page">
    <div class="header">
      <div class="tag">月考一</div>
      <h1>一建在线答题系统</h1>
      <p class="subtitle">共100题 · 满分100分</p>
      <div class="rule-box">
        <span><strong>单选</strong> 70题 × 1分</span>
        <span><strong>多选</strong> 30题 × 2分</span>
      </div>
    </div>
    <div class="card" style="text-align:center;">
      <p style="font-size:15px;color:var(--text-muted);margin-bottom:20px;">
        完成所有题目后提交，系统将自动评分，<br>并提供错题解析和重做功能。
      </p>
      <button class="btn btn-primary btn-block" onclick="startQuiz()">开始答题</button>
    </div>
  </div>

  <!-- 答题页 -->
  <div id="quiz-page" style="display:none;">
    <div class="progress-section">
      <div class="progress-info">
        <span id="q-counter">第 1 题</span>
        <span id="q-status"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:1%"></div>
      </div>
    </div>
    <div id="question-container"></div>
    <div class="nav-row">
      <button class="btn btn-outline btn-sm" id="prev-btn" onclick="prevQ()">&#8592; 上一题</button>
      <div class="nav-dots" id="nav-dots"></div>
      <button class="btn btn-outline btn-sm" id="next-btn" onclick="nextQ()">下一题 &#8594;</button>
    </div>
    <div class="submit-bar" id="submit-bar">
      <button class="btn btn-success btn-block" onclick="showConfirm()">交卷并查看成绩</button>
    </div>
  </div>

  <!-- 结果页 -->
  <div id="result-page">
    <div class="header">
      <div class="tag">答题完成</div>
      <h1>成绩报告</h1>
    </div>
    <div class="score-hero">
      <div class="score-num" id="score-display">0</div>
      <div class="score-label">总分（满分100分）</div>
      <div class="score-bar-wrap">
        <div class="progress-track">
          <div class="progress-fill complete" id="score-bar" style="width:0%"></div>
        </div>
      </div>
      <div class="score-breakdown">
        <div class="score-card">
          <div class="val green" id="single-score">0</div>
          <div class="lbl">单选题得分</div>
        </div>
        <div class="score-card">
          <div class="val green" id="multi-score">0</div>
          <div class="lbl">多选题得分</div>
        </div>
        <div class="score-card">
          <div class="val" id="correct-count">0</div>
          <div class="lbl">答对题数</div>
        </div>
        <div class="score-card">
          <div class="val red" id="wrong-count">0</div>
          <div class="lbl">答错/未答题数</div>
        </div>
      </div>
    </div>
    <div class="result-tabs">
      <button class="tab-btn active" onclick="switchTab('wrong')" id="tab-wrong">错题回顾</button>
      <button class="tab-btn" onclick="switchTab('all')" id="tab-all">全部题目</button>
    </div>
    <div id="wrong-tab">
      <div class="wrong-list" id="wrong-list"></div>
      <div class="retake-section" id="retake-section" style="display:none;">
        <p style="color:var(--text-muted);font-size:14px;margin-bottom:12px;">
          共 <strong id="retake-count">0</strong> 道错题/未答题，按原题号顺序重做
        </p>
        <button class="btn btn-danger btn-block" onclick="startRetake()">&#128260; 错题重做</button>
      </div>
    </div>
    <div id="all-tab" style="display:none;">
      <div id="all-questions-list" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>
    <div style="text-align:center;margin-top:24px;">
      <button class="btn btn-outline" onclick="restartQuiz()">重新答题</button>
    </div>
  </div>

  <!-- 确认对话框 -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <h3>确认交卷？</h3>
      <p>已完成 <strong id="confirm-done">0</strong> / 100 题</p>
      <div class="confirm-btns">
        <button class="btn btn-outline" onclick="hideConfirm()">继续答题</button>
        <button class="btn btn-success" onclick="submitQuiz()">确认交卷</button>
      </div>
    </div>
  </div>

</div>

<script>
// ─── 题目数据（由Python脚本注入） ────────────────────────────────────────────
var EXAM_DATA = [
  {
    "number": 1,
    "type": "single",
    "stem": "工程项目寿命期和建设工程全寿命期区别主要在于是否包含（ ）。",
    "options": {
      "A": "投资决策阶段",
      "B": "勘察设计阶段",
      "C": "建设实施阶段",
      "D": "运营维护阶段"
    },
    "image": null,
    "answer": "D",
    "explanation": "工程项目寿命期包含投资决策和建设实施两个阶段，而建设工程全寿命期 还 包含工程建成后的运营维护阶段。这是两个不同的概念，区别主要在于是否包含运 营维 护阶段。"
  },
  {
    "number": 2,
    "type": "single",
    "stem": "根据《企业投资项目核准和备案管理条例》，企业办理投资项目核准手续时，仅需向核准机关 提交（）。",
    "options": {
      "A": "项目建议书",
      "B": "可行性研究报告",
      "C": "项目申请书",
      "D": "资金申请报告"
    },
    "image": null,
    "answer": "C",
    "explanation": "企业办理投资项目核准手续时，仅需向核准机关提交项目申请书，不再经 过 批准项目建议书、可行性研究报告和开工报告等程序。"
  },
  {
    "number": 3,
    "type": "single",
    "stem": "下列工程造价文件中，属于技术设计阶段文件的是（ ）。",
    "options": {
      "A": "施工图预算",
      "B": "投资估算",
      "C": "设计概算",
      "D": "修正概算"
    },
    "image": null,
    "answer": "D",
    "explanation": "技术设计是指为解决初步设计未解决的重大技术问题而进行的活动，包括 工 艺流程、建筑结构、设备选型等问题的解决。技术设计文件中需要包含修正概算。"
  },
  {
    "number": 4,
    "type": "single",
    "stem": "建设工程新开工时间是指工程设计文件中规定的任何一项永久性工程的（ ）开始日期。",
    "options": {
      "A": "地质勘察",
      "B": "场地旧建筑物拆除",
      "C": "施工用临时道路施工",
      "D": "正式破土开槽"
    },
    "image": null,
    "answer": "D",
    "explanation": "建设工程经批准开工建设获取得施工许可证后，即可进入施工阶段。工程 开 工时间是指该工程设计文件中规定的任何一项永久性工程第一次正式破土开槽开始 施 工的时间。不需开槽的工程，正式开始打桩的时间就是开工时间。"
  },
  {
    "number": 5,
    "type": "single",
    "stem": "对建设单位而言，与平行承包模式相比，工程项目采用联合体承包模式的特点是 （ ）。",
    "options": {
      "A": "组织协调工作量小",
      "B": "合同结构复杂",
      "C": "不利于工程造价控制",
      "D": "不利于工程工期控制"
    },
    "image": null,
    "answer": "A",
    "explanation": "联合体承包模式具有以下特点： （1）建设单位合同结构简单，组织协调工作量小，而且有利于工程造价和工期控制。 （2）可以集中联合体各成员单位在资金、技术和管理等方面优势，克服一家单位力不 能 及的困难，不仅有利于增强竞争能力，同时有利于增强抗风险能力。"
  },
  {
    "number": 6,
    "type": "single",
    "stem": "下列监理机构人员的职责中，总监理工程师可以书面授权委托给总监理工程师代表的是（ ）。",
    "options": {
      "A": "签发工程开工令",
      "B": "组织编写监理月报",
      "C": "审批监理实施细则",
      "D": "组织编写工程质量评估报告"
    },
    "image": null,
    "answer": "B",
    "explanation": "总监理工程师不得将下列工作委托给总监理工程师代表： （1）组织编制监理规划，审批监理实施细则； （2）根据工程进展及监理工作情况调配监理人员； （3）组织审查施工组织设计、（专项）施工方案； （4）签发工程开工令、暂停令和复工令； （5）签发工程款支付证书，组织审核竣工结算； （6）调解建设单位与施工单位的合同争议，处理工程索赔； （7）审查施工单位的竣工申请，组织工程竣工预验收，组织编写工程质量评估报 告， 参与工程竣工验收； （8）参与或配合工程质量安全事故的调查和处理。"
  },
  {
    "number": 7,
    "type": "single",
    "stem": "工程质量监督机构召开首次监督会议的时间是（）。",
    "options": {
      "A": "办理工程质量监督手续后7日内",
      "B": "办理工程质量监督手续后、开工之日起7日内",
      "C": "办理工程质量监督手续后、工程开工前",
      "D": "办理工程质量监督手续后、工程开工前3日内"
    },

// ─── 答题系统逻辑 ────────────────────────────────────────────────────────────
var curIdx = 0, answers = {}, mode = 'quiz', wrongNumbers = [];

function getQuiz() {
  return mode === 'retake' ? EXAM_DATA.filter(function(q) { return wrongNumbers.indexOf(q.number) >= 0; }) : EXAM_DATA;
}

function goTo(idx) {
  curIdx = idx;
  var qs = getQuiz();
  if (idx < 0) curIdx = 0;
  if (idx >= qs.length) curIdx = qs.length - 1;
  renderQ(qs[curIdx]);
  renderDots();
  document.getElementById('prev-btn').disabled = curIdx === 0;
  document.getElementById('next-btn').disabled = curIdx >= qs.length - 1;
  document.getElementById('q-counter').textContent = '第 ' + (curIdx + 1) + ' / ' + qs.length + ' 题';
}

function renderQ(q) {
  var container = document.getElementById('question-container');
  var isMulti = q.type === 'multiple';
  var sel = answers[q.number] || [];

  var html = '<div class="q-type-tag">' + (isMulti ? '多选题' : '单选题') + '</div>';
  html += '<div class="q-stem">' + q.stem + (q.image ? '<br><img src="' + q.image + '" alt="题目配图">' : '') + '</div>';
  html += '<div class="q-options">';

  var letters = isMulti ? ['A','B','C','D','E'] : ['A','B','C','D'];
  for (var i = 0; i < letters.length; i++) {
    var l = letters[i];
    if (!q.options[l]) continue;
    var isSel = sel.indexOf(l) >= 0;
    html += '<div class="opt-item' + (isSel ? ' selected' : '') + '" onclick="toggleOpt(' + q.number + ',\'' + l + '\')" data-num="' + q.number + '" data-letter="' + l + '">';
    html += '<div class="' + (isMulti ? 'opt-checkbox' : 'opt-radio') + '"></div>';
    html += '<span class="opt-label"><strong>' + l + '.</strong> ' + q.options[l] + '</span>';
    html += '</div>';
  }
  html += '</div>';
  if (isMulti) html += '<div class="q-hint">提示：至少选2个，不全选得部分分</div>';
  container.innerHTML = html;
}

function toggleOpt(num, letter) {
  var sel = answers[num] || [];
  var idx = sel.indexOf(letter);
  if (idx >= 0) sel.splice(idx, 1); else sel.push(letter);
  answers[num] = sel;
  var items = document.querySelectorAll('[data-num="' + num + '"]');
  items.forEach(function(it) {
    var l = it.getAttribute('data-letter');
    it.classList.toggle('selected', (answers[num] || []).indexOf(l) >= 0);
  });
  renderDots();
  var qs = getQuiz();
  var done = Object.keys(answers).length;
  document.getElementById('q-status').textContent = '已答 ' + done + ' / ' + qs.length;
  var bar = document.getElementById('submit-bar');
  bar.classList.toggle('show', done === qs.length && mode === 'quiz');
}

function renderDots() {
  var qs = getQuiz();
  var dots = '';
  for (var i = 0; i < qs.length; i++) {
    var n = qs[i].number;
    var ans = answers[n];
    var cls = 'nav-dot';
    if (i === curIdx) cls += ' current';
    if (ans && ans.length > 0) cls += ' answered';
    dots += '<div class="' + cls + '" onclick="goTo(' + i + ')">' + (i + 1) + '</div>';
  }
  document.getElementById('nav-dots').innerHTML = dots;
}

function prevQ() { goTo(curIdx - 1); }
function nextQ() { goTo(curIdx + 1); }

function startQuiz() {
  answers = {}; mode = 'quiz'; curIdx = 0;
  document.getElementById('start-page').style.display = 'none';
  document.getElementById('quiz-page').style.display = 'block';
  document.getElementById('result-page').style.display = 'none';
  document.getElementById('submit-bar').classList.remove('show');
  goTo(0);
}

function showConfirm() {
  document.getElementById('confirm-overlay').classList.add('show');
}

function submitQuiz() {
  document.getElementById('confirm-overlay').classList.remove('show');
  var qs = EXAM_DATA, total = 0, sScore = 0, mScore = 0;
  var wrong = [], wn = [];
  for (var i = 0; i < qs.length; i++) {
    var q = qs[i], num = q.number;
    var uAns = answers[num] || [];
    var correctAns = q.answer.split('');
    var isMulti = q.type === 'multiple';
    var pts = 0;

    if (isMulti) {
      var hasWrong = false, hasMissed = false, selRight = 0;
      for (var ci = 0; ci < correctAns.length; ci++) {
        if (uAns.indexOf(correctAns[ci]) < 0) hasMissed = true; else selRight++;
      }
      for (var ui = 0; ui < uAns.length; ui++) {
        if (correctAns.indexOf(uAns[ui]) < 0) { hasWrong = true; break; }
      }
      if (!hasWrong && !hasMissed) { pts = 2; mScore += 2; }
      else if (!hasWrong && hasMissed) { pts = Math.round(selRight * 0.5 * 10) / 10; mScore += pts; }
    } else {
      if (uAns.length === 1 && correctAns.indexOf(uAns[0]) >= 0) { pts = 1; sScore += 1; }
    }
    total += pts;
    if (pts < (isMulti ? 2 : 1)) { wrong.push(q); wn.push(num); }
  }
  wrongNumbers = wn;
  showResult(total, sScore, mScore, wrong);
}

function showResult(total, sScore, mScore, wrong) {
  document.getElementById('quiz-page').style.display = 'none';
  document.getElementById('result-page').style.display = 'block';
  document.getElementById('score-display').textContent = total;
  document.getElementById('score-bar').style.width = total + '%';
  document.getElementById('single-score').textContent = sScore;
  document.getElementById('multi-score').textContent = mScore;
  document.getElementById('correct-count').textContent = (100 - wrong.length);
  document.getElementById('wrong-count').textContent = wrong.length;
  renderWrongList(wrong, sScore, mScore);
}

function renderWrongList(wrong, sScore, mScore) {
  var container = document.getElementById('wrong-list');
  var html = '';
  for (var i = 0; i < wrong.length; i++) {
    var q = wrong[i];
    var uAns = answers[q.number] || [];
    var correctAns = q.answer.split('');
    var isMulti = q.type === 'multiple';
    var isPart = false;

    if (isMulti) {
      var hasWrong = false, hasMissed = false, selRight = 0;
      for (var ci = 0; ci < correctAns.length; ci++) {
        if (uAns.indexOf(correctAns[ci]) < 0) hasMissed = true; else selRight++;
      }
      for (var ui = 0; ui < uAns.length; ui++) {
        if (correctAns.indexOf(uAns[ui]) < 0) { hasWrong = true; break; }
      }
      isPart = (!hasWrong && hasMissed);
    }

    var scoreLabel = isPart ? '部分得分' : '未得分';
    var scoreClass = isPart ? 'partial' : 'zero';

    html += '<div class="wrong-item" id="wi-' + q.number + '">';
    html += '<div class="wrong-item-header" onclick="toggleDetail(' + q.number + ')">';
    html += '<div class="wrong-badge">' + (i + 1) + '</div>';
    html += '<div class="wrong-item-title">第 ' + q.number + ' 题 · ' + (isMulti ? '多选' : '单选') + '</div>';
    html += '<div class="wrong-item-score ' + scoreClass + '">' + scoreLabel + '</div>';
    html += '<div class="expand-icon">▼</div>';
    html += '</div>';
    html += '<div class="wrong-detail" id="wd-' + q.number + '">';
    html += '<div style="font-size:14px;margin-bottom:8px;">' + q.stem + '</div>';
    html += '<div style="display:flex;flex-direction:column;gap:4px;">';

    var letters = isMulti ? ['A','B','C','D','E'] : ['A','B','C','D'];
    for (var li = 0; li < letters.length; li++) {
      var l = letters[li];
      if (!q.options[l]) continue;
      var isCorrect = correctAns.indexOf(l) >= 0;
      var isSelected = uAns.indexOf(l) >= 0;
      var itemClass = 'wrong-opt-item ' + (isCorrect ? (isSelected ? 'is-correct' : 'not-selected') : (isSelected ? 'is-wrong' : ''));
      var icon = isCorrect ? '✓ 正确' : (isSelected ? '✗ 错误' : '○ 未选');
      html += '<div class="' + itemClass + '"><strong>' + l + '.</strong> ' + q.options[l] + ' <span style="margin-left:auto;font-size:12px;">' + icon + '</span></div>';
    }
    html += '</div>';
    html += '<div class="explanation-box"><strong>解析：</strong>' + q.explanation + '</div>';
    html += '</div></div>';
  }

  var allHtml = '';
  var qs = EXAM_DATA;
  for (var i = 0; i < qs.length; i++) {
    var q2 = qs[i];
    var uAns2 = answers[q2.number] || [];
    var correctAns2 = q2.answer.split('');
    var isMulti2 = q2.type === 'multiple';
    var isPart2 = false, myScore = 0, maxPts = isMulti2 ? 2 : 1;

    if (isMulti2) {
      var hasWrong2 = false, hasMissed2 = false, selRight2 = 0;
      for (var ci2 = 0; ci2 < correctAns2.length; ci2++) {
        if (uAns2.indexOf(correctAns2[ci2]) < 0) hasMissed2 = true; else selRight2++;
      }
      for (var ui2 = 0; ui2 < uAns2.length; ui2++) {
        if (correctAns2.indexOf(uAns2[ui2]) < 0) { hasWrong2 = true; break; }
      }
      if (!hasWrong2 && !hasMissed2) { myScore = 2; }
      else if (!hasWrong2 && hasMissed2) { myScore = Math.round(selRight2 * 0.5 * 10) / 10; isPart2 = true; }
    } else {
      myScore = (uAns2.length === 1 && correctAns2.indexOf(uAns2[0]) >= 0) ? 1 : 0;
    }

    var scoreClass2 = myScore >= maxPts ? 'full' : (myScore > 0 ? 'partial' : 'zero');
    allHtml += '<div class="all-q-card" style="margin-bottom:12px;">';
    allHtml += '<div class="all-q-result">';
    var letters2 = isMulti2 ? ['A','B','C','D','E'] : ['A','B','C','D'];
    for (var li2 = 0; li2 < letters2.length; li2++) {
      var l2 = letters2[li2];
      if (!q2.options[l2]) continue;
      var isCorrect2 = correctAns2.indexOf(l2) >= 0;
      var isSelected2 = uAns2.indexOf(l2) >= 0;
      var rcls = isCorrect2 ? 'correct' : (isSelected2 ? 'wrong' : 'missed');
      allHtml += '<span class="res-opt ' + rcls + '">' + l2 + '</span>';
    }
    allHtml += '<span class="all-q-score ' + scoreClass2 + '" style="margin-left:auto;">' + myScore + '分</span>';
    allHtml += '</div>';
    allHtml += '<div class="all-q-exp"><strong>解析：</strong>' + q2.explanation + '</div>';
    allHtml += '</div>';
  }

  container.innerHTML = html;
  document.getElementById('all-list').innerHTML = allHtml;

  // tab 切换
  var tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(function(t) {
    t.onclick = function() {
      tabs.forEach(function(x) { x.classList.remove('active'); });
      t.classList.add('active');
      document.getElementById('wrong-tab').style.display = t.dataset.tab === 'wrong' ? 'block' : 'none';
      document.getElementById('all-tab').style.display = t.dataset.tab === 'all' ? 'block' : 'none';
      document.getElementById('retake-section').style.display = t.dataset.tab === 'wrong' ? 'block' : 'none';
    };
  });

  // 错题重做按钮
  var retakeEl = document.getElementById('retake-section');
  if (retakeEl) {
    retakeEl.innerHTML = '<button class="btn btn-warning" onclick="retakeWrong()">🔄 错题重做（' + wrong.length + ' 题）</button>';
  }
}

function toggleDetail(num) {
  var detail = document.getElementById('wd-' + num);
  var item = document.getElementById('wi-' + num);
  if (!detail || !item) return;
  var isOpen = detail.classList.contains('open');
  detail.classList.toggle('open');
  item.querySelector('.expand-icon').classList.toggle('open', !isOpen);
}

function retakeWrong() {
  if (wrongNumbers.length === 0) { alert('没有错题！'); return; }
  answers = {}; mode = 'retake'; curIdx = 0;
  document.getElementById('result-page').style.display = 'none';
  document.getElementById('quiz-page').style.display = 'block';
  document.getElementById('submit-bar').classList.remove('show');
  goTo(0);
  document.getElementById('q-status').textContent = '已答 0 / ' + getQuiz().length;
}

function restartQuiz() {
  answers = {}; mode = 'quiz'; curIdx = 0; wrongNumbers = [];
  document.getElementById('result-page').style.display = 'none';
  document.getElementById('quiz-page').style.display = 'none';
  document.getElementById('start-page').style.display = 'block';
}
</script>
</script>
</body>
</html>
