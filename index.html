<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonEXA - 月考导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .nav-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-button {
            display: block;
            background: white;
            border-radius: 15px;
            padding: 25px 30px;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-button.active {
            cursor: pointer;
        }

        .nav-button.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transition: width 0.3s ease;
        }

        .nav-button.active:hover::before {
            width: 100%;
            opacity: 0.1;
        }

        .nav-button.active:hover {
            transform: translateX(10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        .nav-button.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #f5f5f5;
        }

        .nav-button.disabled::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: #ccc;
        }

        .nav-button-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .nav-button-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .exam-number {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            font-weight: bold;
            flex-shrink: 0;
        }

        .nav-button.active .exam-number {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .nav-button.disabled .exam-number {
            background: #ddd;
            color: #999;
        }

        .nav-button-text {
            flex: 1;
        }

        .nav-button-text h3 {
            font-size: 1.3em;
            margin-bottom: 5px;
        }

        .nav-button.active .nav-button-text h3 {
            color: #333;
        }

        .nav-button.disabled .nav-button-text h3 {
            color: #999;
        }

        .nav-button-text p {
            font-size: 0.95em;
        }

        .nav-button.active .nav-button-text p {
            color: #666;
        }

        .nav-button.disabled .nav-button-text p {
            color: #bbb;
        }

        .nav-button-arrow {
            font-size: 1.5em;
            transition: transform 0.3s ease;
        }

        .nav-button.active .nav-button-arrow {
            color: #f5576c;
        }

        .nav-button.disabled .nav-button-arrow {
            color: #ccc;
        }

        .nav-button.active:hover .nav-button-arrow {
            transform: translateX(5px);
        }

        .coming-soon {
            background: #ff9800;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .nav-button {
                padding: 20px;
            }

            .exam-number {
                width: 40px;
                height: 40px;
                font-size: 1em;
            }

            .nav-button-text h3 {
                font-size: 1.1em;
            }
        }
    </style>
</head>
