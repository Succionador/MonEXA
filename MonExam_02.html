<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建造师范工第二次月考 - 在线答题系统</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #1a1d27;
    --bg-card: #1e2130;
    --bg-hover: #252840;
    --border: #2e3250;
    --text-primary: #e8eaf6;
    --text-secondary: #9ca3af;
    --text-muted: #6b7280;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --accent-light: rgba(99,102,241,0.15);
    --success: #22c55e;
    --success-light: rgba(34,197,94,0.15);
    --danger: #ef4444;
    --danger-light: rgba(239,68,68,0.15);
    --warning: #f59e0b;
    --warning-light: rgba(245,158,11,0.15);
    --multi-color: #a78bfa;
    --multi-light: rgba(167,139,250,0.15);
  }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    height: auto;
    min-height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap;
    padding: 6px 20px;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }

  .timer-display {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Courier New', monospace;
    font-size: 16px; font-weight: 700;
    color: var(--accent-hover);
    min-width: 90px; text-align: center;
  }
  .timer-display.paused { color: var(--warning); border-color: var(--warning); }

  .btn {
    padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary {
    background: var(--bg-card); color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #dc2626; }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { background: #16a34a; }
  .btn-warning { background: var(--warning); color: #1a1a1a; }
  .btn-warning:hover { background: #d97706; }

  /* ===== MAIN LAYOUT ===== */
  .main-wrapper { padding-top: 56px; min-height: 100vh; }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 220px; min-height: calc(100vh - 56px);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    position: fixed; top: 56px; left: 0; bottom: 0;
    overflow-y: auto; padding: 16px 12px;
    transition: transform 0.3s;
  }
  .sidebar-section { margin-bottom: 16px; }
  .sidebar-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    color: var(--text-muted); letter-spacing: 1px;
    padding: 0 4px; margin-bottom: 8px;
  }
  .q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
  .q-dot {
    width: 30px; height: 30px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; cursor: pointer;
    background: var(--bg-card); color: var(--text-muted);
    border: 1px solid var(--border); transition: all 0.15s;
  }
  .q-dot:hover { background: var(--bg-hover); color: var(--text-primary); }
  .q-dot.answered { background: var(--accent-light); color: var(--accent-hover); border-color: var(--accent); }
  .q-dot.current { background: var(--accent); color: white; border-color: var(--accent); }
  .q-dot.correct { background: var(--success-light); color: var(--success); border-color: var(--success); }
  .q-dot.wrong { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }
  .q-dot.partial { background: var(--warning-light); color: var(--warning); border-color: var(--warning); }

  /* ===== CONTENT AREA ===== */
  .content { margin-left: 220px; flex: 1; padding: 24px; max-width: 860px; }

  /* ===== PROGRESS ===== */
  .progress-bar-wrap {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; height: 6px; margin-bottom: 20px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--multi-color));
    border-radius: 10px; transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 12px; color: var(--text-muted);
    margin-bottom: 8px;
    display: flex; justify-content: space-between;
  }

  /* ===== QUESTION CARD ===== */
  .question-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 28px; margin-bottom: 20px;
  }
  .question-meta {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .q-number {
    background: var(--accent); color: white;
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  .q-type-badge {
    padding: 3px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .q-type-badge.single {
    background: var(--accent-light); color: var(--accent-hover);
  }
  .q-type-badge.multi {
    background: var(--multi-light); color: var(--multi-color);
  }
  .q-score-badge {
    margin-left: auto;
    font-size: 12px; color: var(--text-muted);
  }
  .question-text {
    font-size: 16px; line-height: 1.8; color: var(--text-primary);
    margin-bottom: 20px;
  }

  /* ===== OPTIONS ===== */
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px; border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--bg-secondary);
    cursor: pointer; transition: all 0.15s;
  }
  .option-item:hover { border-color: var(--accent); background: var(--accent-light); }
  .option-item.selected {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .option-item.correct-answer {
    border-color: var(--success) !important;
    background: var(--success-light) !important;
  }
  .option-item.wrong-answer {
    border-color: var(--danger) !important;
    background: var(--danger-light) !important;
  }
  .option-item.missed-answer {
    border-color: var(--warning) !important;
    background: var(--warning-light) !important;
  }
  .option-letter {
    width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    background: var(--bg-card); color: var(--text-secondary);
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .option-item.selected .option-letter {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .option-item.correct-answer .option-letter {
    background: var(--success); color: white; border-color: var(--success);
  }
  .option-item.wrong-answer .option-letter {
    background: var(--danger); color: white; border-color: var(--danger);
  }
  .option-item.missed-answer .option-letter {
    background: var(--warning); color: #1a1a1a; border-color: var(--warning);
  }
  .option-text { font-size: 14px; line-height: 1.6; color: var(--text-primary); }

  /* ===== NAV BUTTONS ===== */
  .nav-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    margin-top: 8px;
  }
  .nav-center { display: flex; gap: 8px; }

  /* ===== ANALYSIS BOX ===== */
  .analysis-box {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; margin-top: 16px;
    font-size: 14px; line-height: 1.8; color: var(--text-secondary);
  }
  .analysis-box.show { display: block; }
  .analysis-header {
    font-size: 13px; font-weight: 700; color: var(--accent-hover);
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .answer-line {
    font-size: 14px; font-weight: 700; margin-bottom: 8px;
  }
  .answer-line .ans-correct { color: var(--success); }
  .answer-line .ans-your { margin-left: 16px; }
  .answer-line .ans-right { color: var(--success); }
  .answer-line .ans-wrong { color: var(--danger); }
  .answer-line .ans-partial { color: var(--warning); }

  /* ===== RESULT PAGE ===== */
  .result-page {
    display: none;
    padding: 24px;
    margin-left: 220px;
    max-width: 860px;
  }
  .result-header {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 32px; text-align: center; margin-bottom: 24px;
  }
  .result-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .result-score {
    font-size: 64px; font-weight: 900; line-height: 1.1;
    background: linear-gradient(135deg, var(--accent), var(--multi-color));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .result-total { font-size: 18px; color: var(--text-muted); margin-bottom: 24px; }
  .result-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-top: 20px;
  }
  .stat-card {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; text-align: center;
  }
  .stat-num { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .stat-card.green .stat-num { color: var(--success); }
  .stat-card.red .stat-num { color: var(--danger); }
  .stat-card.yellow .stat-num { color: var(--warning); }
  .stat-card.blue .stat-num { color: var(--accent-hover); }

  .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }

  /* ===== ERROR LIST ===== */
  .error-section {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; margin-bottom: 20px;
  }
  .error-section-title {
    font-size: 16px; font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border); padding-bottom: 12px;
  }
  .error-item { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .error-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .error-q-header {
    display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px;
  }
  .error-q-num {
    background: var(--danger-light); color: var(--danger);
    border: 1px solid var(--danger);
    width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .error-q-text { font-size: 14px; line-height: 1.7; }
  .error-options { margin: 8px 0 8px 38px; }
  .error-opt {
    font-size: 13px; padding: 4px 0; color: var(--text-secondary);
    display: flex; gap: 8px;
  }
  .error-opt.is-correct { color: var(--success); font-weight: 600; }
  .error-opt.was-selected { color: var(--danger); }
  .error-analysis {
    margin-left: 38px; margin-top: 8px;
    font-size: 13px; line-height: 1.7; color: var(--text-secondary);
    background: var(--bg-secondary); border-radius: 8px; padding: 10px 12px;
    border-left: 3px solid var(--accent);
  }
  .partial-badge {
    display: inline-block; padding: 2px 8px;
    background: var(--warning-light); color: var(--warning);
    border-radius: 4px; font-size: 11px; font-weight: 600;
    margin-left: 8px;
  }

  /* ===== PAUSE OVERLAY ===== */
  .pause-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 500;
    align-items: center; justify-content: center;
  }
  .pause-overlay.active { display: flex; }
  .pause-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px; text-align: center; max-width: 340px;
  }
  .pause-icon { font-size: 48px; margin-bottom: 16px; }
  .pause-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .pause-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }

  /* ===== RESUME BANNER ===== */
  .resume-banner {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 600;
    align-items: center; justify-content: center;
  }
  .resume-banner.active { display: flex; }
  .resume-card {
    background: var(--bg-card); border: 1px solid var(--accent);
    border-radius: 16px; padding: 36px; text-align: center; max-width: 380px;
  }
  .resume-icon { font-size: 44px; margin-bottom: 12px; }
  .resume-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .resume-info { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.8; }
  .resume-btns { display: flex; gap: 10px; justify-content: center; }

  /* ===== REDO MODE BANNER ===== */
  .redo-banner {
    background: linear-gradient(135deg, var(--multi-light), var(--accent-light));
    border: 1px solid var(--multi-color);
    border-radius: 10px; padding: 12px 16px;
    margin-bottom: 16px; display: none;
    font-size: 13px; color: var(--multi-color);
    display: flex; align-items: center; gap: 8px;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ===== TOOLTIP ===== */
  .tooltip { position: relative; }
  .tooltip-text {
    visibility: hidden; background: #333; color: #fff;
    text-align: center; border-radius: 6px; padding: 5px 10px;
    position: absolute; z-index: 1; bottom: 125%; left: 50%;
    transform: translateX(-50%); white-space: nowrap;
    font-size: 11px;
  }
  .tooltip:hover .tooltip-text { visibility: visible; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .content, .result-page { margin-left: 0; padding: 16px 12px; }

    /* === TOPBAR: 两行布局（尺寸放大） === */
    .topbar {
      height: auto !important;
      flex-wrap: wrap;
      padding: 10px 12px 6px;
      gap: 4px;
    }
    .topbar-left {
      width: 100%; justify-content: center;
      padding-bottom: 6px; gap: 8px;
    }
    .topbar-left svg { width: 24px; height: 24px; flex-shrink: 0; }
    .topbar-title span:first-child { font-size: 15px; }
    .topbar-title span:last-child { font-size: 11px; }
    .topbar-right {
      width: 100%;
      justify-content: center;
      gap: 10px;
      padding-bottom: 4px;
    }
    .topbar-right .timer-display {
      padding: 5px 10px;
      font-size: 14px;
      min-width: 80px;
      flex-shrink: 0;
    }
    .topbar-right .btn {
      padding: 6px 12px;
      font-size: 13px;
      flex-shrink: 0;
    }

    /* === MOBILE QUESTION NAV === */
    .mobile-nav-bar {
      display: block !important;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      margin-bottom: 14px;
    }
    .mobile-nav-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .mobile-nav-toggle {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      color: var(--text-primary);
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .mobile-nav-info {
      font-size: 11px;
      color: var(--text-muted);
    }
    .mobile-nav-info strong { color: var(--accent-hover); }
    .mobile-nav-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 3px;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 6px;
      display: none;
    }
    .mobile-nav-grid.show { display: grid; }
    .mobile-nav-dot {
      aspect-ratio: 1;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; cursor: pointer;
      background: var(--bg-secondary); color: var(--text-muted);
      border: 1px solid var(--border); transition: all 0.1s;
    }
    .mobile-nav-dot.answered { background: var(--accent-light); color: var(--accent-hover); border-color: var(--accent); }
    .mobile-nav-dot.current { background: var(--accent); color: white; border-color: var(--accent); }
    .mobile-nav-dot.correct { background: var(--success-light); color: var(--success); border-color: var(--success); }
    .mobile-nav-dot.wrong { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }
    .mobile-nav-dot.partial { background: var(--warning-light); color: var(--warning); border-color: var(--warning); }

    /* === PROGRESS === */
    .progress-text { font-size: 11px; }
    .progress-bar-wrap { margin-bottom: 12px; }

    /* === QUESTION CARD: 紧凑 === */
    .question-card { padding: 16px 14px; margin-bottom: 12px; border-radius: 10px; }
    .question-meta { gap: 6px; margin-bottom: 10px; }
    .q-number { width: 26px; height: 26px; font-size: 12px; border-radius: 6px; }
    .q-type-badge { padding: 2px 6px; font-size: 10px; }
    .q-score-badge { font-size: 10px; }
    .question-text { font-size: 14px; line-height: 1.7; margin-bottom: 10px; }

    /* === OPTIONS: 紧凑 === */
    .options-list { gap: 6px; }
    .option-item { padding: 9px 10px; gap: 8px; border-radius: 8px; }
    .option-letter { width: 22px; height: 22px; font-size: 11px; border-radius: 5px; }
    .option-text { font-size: 13px; line-height: 1.5; }

    /* === NAV BUTTONS === */
    .nav-row { gap: 6px; }
    .nav-row .btn { padding: 7px 10px; font-size: 12px; }

    /* === RESULT PAGE === */
    .result-header { padding: 20px 16px; }
    .result-score { font-size: 48px; }
    .result-stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-num { font-size: 22px; }
    .stat-label { font-size: 11px; }
    .result-actions { gap: 6px; }
    .result-actions .btn { padding: 7px 10px; font-size: 12px; }

    /* === ANALYSIS BOX === */
    .analysis-box { padding: 12px; font-size: 13px; margin-top: 10px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar" id="topBar">
  <div class="topbar-left">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="rgba(99,102,241,0.2)"/>
      <path d="M2 17L12 22L22 17" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M2 12L12 17L22 12" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="topbar-title" style="display:flex;flex-direction:column;line-height:1.3;">
      <span>2026一级建造师</span>
      <span style="font-size:12px;color:var(--text-secondary);font-weight:500;">管理科目第二次月考</span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <button class="btn btn-secondary" id="pauseBtn" onclick="togglePause()">⏸ 暂停</button>
    <button class="btn btn-primary" id="submitBtn" onclick="confirmSubmit()" style="display:none;">提交试卷</button>
  </div>
</div>

<!-- PAUSE OVERLAY -->
<div class="pause-overlay" id="pauseOverlay">
  <div class="pause-card">
    <div class="pause-icon">⏸️</div>
    <div class="pause-title">已暂停</div>
    <div class="pause-sub">计时已停止，题目内容已遮挡</div>
    <button class="btn btn-primary" style="width:100%;" onclick="togglePause()">▶ 继续答题</button>
  </div>
</div>

<!-- RESUME BANNER -->
<div class="resume-banner" id="resumeBanner">
  <div class="resume-card">
    <div class="resume-icon">💾</div>
    <div class="resume-title">发现上次答题进度</div>
    <div class="resume-info" id="resumeInfo"></div>
    <div class="resume-btns">
      <button class="btn btn-primary" onclick="resumeProgress()">继续作答</button>
      <button class="btn btn-secondary" onclick="startFresh()">重新开始</button>
    </div>
  </div>
</div>

<!-- MAIN WRAPPER -->
<div class="main-wrapper">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-section">

次，不得将本年成本转入下一年度。选项D错误，分部分项工程成本分 析的方法是进行预算成本、目标成本、实际成本的“三算”对比。故选B。"}, {"num": 55, "type": "single", "question": "下列关于360反馈法特点的说法，错误的是（）。", "options": {"A": "360反馈法涵盖了全方位、多角度的考核，能避免个人偏见等主观因素的影响，使考核结果更全面、公正", "B": "360反馈法多为定量指标，考核的主观性不强，不易沦为 “人缘考核”", "C": "360反馈法可能由于沟通不到位，导致企业中形成紧张和猜疑的气氛，影响员工的工作积极性和员工关系", "D": "360反馈法中部门员工相互监督、相互考评，促使员工日常要处理好各级关系，增强团队合作意识"}, "answer": ["B"], "analysis": "360反馈法多为定性指标，考核的主观性较强，容易沦为“人 缘考核”，导致考核结果和实际表现不一致。故选B。"}, {"num": 56, "type": "single", "question": "轨迹交叉理论认为人的不安全行为与物的不安全状态是事故发生的直接\n原因。下列不属于人的因素运动轨迹的是（）。", "options": {"A": "生理、心理缺陷", "B": "社会环境、企业管理上的缺陷", "C": "设计上的缺陷", "D": "后天的身体缺陷"}, "answer": ["C"], "analysis": "人的因素运动轨迹导致人的不安全行为（人的事件），其 运动轨迹是：生理、心理缺陷→社会环境、企业管理上的缺陷→后天的身体缺陷 →视、听、嗅、味、触五官能量分配上的差异→行为失误（不安全行为）。选项 C 属于物的因素运动轨迹。故选 C。"}, {"num": 57, "type": "single", "question": "下列不属于判断事故频发倾向者方法的是（）。", "options": {"A": "心理学测试", "B": "日常行为观察", "C": "事故发生次数是否符合非均等分布", "D": "进行问卷调查"}, "answer": ["D"], "analysis": "根据事故发生次数是否符合非均等分布，可以判断企业是 否存在事故频发倾向者。对于发生事故次数较多的人，可以通过一定的手段（如 心理学测试、日常行为观察）判别是否属于事故频发倾向者。故选D。"}, {"num": 58, "type": "single", "question": "下列关于安全生产费用提取和使用的说法，错误的是（）。", "options": {"A": "企业安全生产费用出现赤字的，应当于年末补提企业安全生产费用", "B": "企业安全生产费用年度结余资金结转下年度使用", "C": "竣工决算后结余的企业安全生产费用，应退回建设单位", "D": "企业从业人员发现报告事故隐患的奖励支出和职工薪酬，不得从企业安全生产费用中列支"}, "answer": ["D"], "analysis": "企业职工薪酬、福利不得从企业安全生产费用中支出。企 业从业人员发现报告事故隐患的奖励支出，应从企业安全生产费用中列支。故选 D"}, {"num": 59, "type": "single", "question": "下列关于企业在编制投标报价时对安全生产费用处理的做法，正确的是\n（）。", "options": {"A": "可以不包含企业安全生产费用", "B": "包含但不单列企业安全生产费用", "C": "包含并单列企业安全生产费用", "D": "竞标时可适当删减企业安全生产费用"}, "answer": ["C"], "analysis": "建设工程施工企业编制投标报价应包含并单列企业安全生 产费用，竞标时不得删减。故选C。"}, {"num": 60, "type": "single", "question": "攀登作业使用单梯时，梯面应与水平面成（）度夹角。", "options": {"A": "60", "B": "65", "C": "70", "D": "75"}, "answer": ["D"], "analysis": "攀登作业使用单梯时，梯面应与水平面成75°夹角，踏步 不得缺失，梯格间距宜为300mm，不得垫高使用。故选D。"}, {"num": 61, "type": "single", "question": "某县一建筑工地发生生产安全较大事故，则事故调查组应由（）负责组织。", "options": {"A": "事故发生地省级人民政府", "B": "事故发生地设区的市级人民政府", "C": "国务院应急管理部门", "D": "事故发生单位"}, "answer": ["B"], "analysis": "重大事故、较大事故、一般事故分别由事故发生地省级人 民政府、设区的市级人民政府、县级人民政府负责调查。故选B。"}, {"num": 62, "type": "single", "question": "下列关于应急预案的评审、论证的说法，正确的是（）。", "options": {"A": "与所评审应急预案的企业有利害关系的评审人员可参与评审", "B": "应急预案论证可通过推演的方式开展", "C": "评审内容仅包括应急预案体系设计的针对性和应急响应程序的合理性两项", "D": "参加应急预案评审的人员不包括有关安全生产及应急管理方面的专家"}, "answer": ["B"], "analysis": "选项A错误，评审人员与所评审应急预案的企业有利害关 系的，应当回避。选项C错误，评审内容包括风险评估和应急资源调查的全面性、 应急预案体系设计的针对性、应急组织体系的合理性、应急响应程序和措施的科 学性、应急保障措施的可行性、应急预案的衔接性。选项D错误，参加应急预案 评审的人员可包括有关安全生产及应急管理方面的、有现场处置经验的专家。故 选B。"}, {"num": 63, "type": "single", "question": "根据《建筑工程绿色施工规范》，下列属于设计单位在实施绿色施工时\n应承担的职责是（）。", "options": {"A": "审查绿色施工组织设计、绿色施工方案或绿色施工专项方案", "B": "建立建设工程绿色施工的协调机制", "C": "协助、支持、配合施工单位做好建设工程绿色施工的有关设计工作", "D": "对建设工程绿色施工承担监理责任"}, "answer": ["C"], "analysis": "选项AD属于工程监理单位绿色施工职责。选项B属于建设 单位绿色施工职责。故选C。"}, {"num": 64, "type": "single", "question": "绿色施工需遵循循环经济的 “3R” 原则，其中 “再循环” 是指（）。", "options": {"A": "通过输入端控制方式，用较少资源投入来达到既定的生产目的", "B": "通过过程端控制方式，将废物直接作为产品或经修复、翻新、再制造后继续作为产品使用", "C": "通过过程端控制方式，将废物的全部或部分作为其他产品的部件予以使用", "D": "通过输出端控制方式，将生产出来的物品在完成其使用功能后通过回收利用重新变成可用资源"}, "answer": ["D"], "analysis": "循环经济的“3R”原则中的“再循环”是指通过输出端控制方 式，将生产出来的物品在完成其使用功能后通过回收利用重新变成可用资源，减 少垃圾的产生。故选D。"}, {"num": 65, "type": "single", "question": "精益管理中的“益”体现在（）上。", "options": {"A": "质量", "B": "进度", "C": "成本", "D": "安全"}, "answer": ["C"], "analysis": "精益管理中的“精”体现在质量上，追求“精益求精”；“益” 体现在成本上，减少资源消耗和浪费，多产出效益。故选C。"}, {"num": 66, "type": "single", "question": "下列关于外国企业设立形式的说法，错误的是（）。", "options": {"A": "可以设立办事处", "B": "可以选择独资企业形式", "C": "可以成立有限责任公司", "D": "只能以股份有限公司形式存在"}, "answer": ["D"], "analysis": "外国企业设立形式包括公司代表处（办事处）、分公司、 独资企业、有限责任公司和股份有限公司等形式。故选D。"}, {"num": 67, "type": "single", "question": "下列属于国际工程承包风险中市场风险的是（）。", "options": {"A": "国际关系", "B": "经济结构", "C": "低价竞争", "D": "跨文化冲突"}, "answer": ["C"], "analysis": "选项A属于政治风险。选项B属于经济风险。选项D属于社 会风险。故选C。"}, {"num": 68, "type": "single", "question": "在 FIDIC 施工合同条件下，下列关于业主责任和义务的说法，错误的是\n（）。", "options": {"A": "向承包商及时提供信息、指示、同意、批准及发出通知", "B": "给予承包商现场占有权", "C": "协助承包商申办工程所在国法律要求的相关许可", "D": "为工程执行和竣工支付所有必需的费用"}, "answer": ["D"], "analysis": "业主并非负责支付工程执行和竣工的所有费用，而是在承 包商完成相应工作时按时支付工程款。故选 D。"}, {"num": 69, "type": "single", "question": "下列不可以作为 BIM 总协调方部门或单位的是（）。", "options": {"A": "建设单位相关部门", "B": "施工单位", "C": "第三方咨询机构", "D": "监理单位"}, "answer": ["D"], "analysis": "BIM总协调方可以为满足要求的建设单位相关部门、设计 单位、施工单位或第三方咨询机构。故选D。"}, {"num": 70, "type": "single", "question": "下列不属于 BIM 技术在工程施工安全管理中的应用的是（）。", "options": {"A": "施工安全教育", "B": "施工现场的安全措施布置", "C": "施工安全模拟", "D": "碰撞检测"}, "answer": ["D"], "analysis": "BIM 技术在工程施工安全管理中的应用主要有以下几方 面：①施工安全教育；②施工现场的安全措施布置；③施工安全模拟。故选 D。"}, {"num": 71, "type": "multi", "question": "下列工程开工时间的认定中，正确的有（ ）。", "options": {"A": "不需开槽的工程以正式开始打桩的时间作为开工时间", "B": "以施工方的临时工程开始施工时间作为开工时间", "C": "分期建设的工程以第一期工程的开工时间作为开工时间", "D": "土石方工程以平整场地开始时间作为开工时间", "E": "以设计文件规定的永久性工程第一次正式破土开槽时间作为开工时间"}, "answer": ["A", "E"], "analysis": "本题考查的是工程开工时间的含义。工程开工时间是 指该工程设计文件中规定的任何一项永久性工程第一次正式破土开槽开始施工 的时间。不需开槽的工程，正式开始打桩的时间就是开工时间。铁路、公路、水 库等需要进行大量土石方工程的，以正式开始进行土方、石方工程的时间作为正 式开工时间。"}, {"num": 72, "type": "multi", "question": "对建设单位而言，工程总承包模式的优点有（ ）。", "options": {"A": "有利于控制工程质量", "B": "便于提前确定工程造价", "C": "工程项目责任主体单一化", "D": "直接管理工程勘察设计和施工，指令易贯彻执行", "E": "有利于缩短建设周期"}, "answer": ["B", "C", "E"], "analysis": "本题考查的是工程总承包模式。工程总承包模式的优 点主要体现在以下几方面： ① 有利于缩短建设工期。 ② 便于建设单位提前确定工程造价。 ③ 使工程项目责任主体单一化。 ④ 可减轻建设单位合同管理的负担。"}, {"num": 73, "type": "multi", "question": "下列关于 CM 承包模式的说法，正确的有（ ）。", "options": {"A": "CM 承包模式下采用快速路径法施工", "B": "CM 单位直接与分包单位签订分包合同", "C": "CM 合同采用成本加酬金的计价方式", "D": "CM 单位与分包单位之间的合同价是保密的", "E": "CM 单位不赚取总包与分包之间的差价"}, "answer": ["A", "C", "E"], "analysis": "CM 模式的特点： ①采用快速路径法施工。 ②CM 单位有代理型和非代理型两种。代理型的 CM 单位不负责工程分包 的发包，与分包单位的合同由建设单位直接签订。 ③CM 合同采用成本加酬金方式。 ④CM 单位不赚取总包与分包之间的差价。"}, {"num": 74, "type": "multi", "question": "申请开工的工程具备（ ）条件的，总监理工程师方可在工程开工报审表\n签署同意开工的意见并报建设单位批准。", "options": {"A": "已完成设计交底和图纸会审", "B": "已签认施工组织设计", "C": "已审核分包单位资质", "D": "已开通进场道路及水、电、通信", "E": "签署的工程开工报审表已获建设单位批准"}, "answer": ["A", "B", "D"], "analysis": "本题考查的是签发工程开工令的条件。申请开工的工 程具备下列条件的，总监理工程师方可在工程开工报审表签署同意开工的意见并 报建设单位批准： （1）设计交底和图纸会审已完成； （2）施工组织设计已由总监理工程师签认； （3）施工单位现场质量、安全生产管理体系已建立，管理及施工人员已到位， 施工机械具备使用条件，主要工程材料已落实； （4）进场道路及水、电、通信等已满足开工要求。"}, {"num": 75, "type": "multi", "question": "下列关于价值驱动型项目管理应考虑的商业价值因素的说法中，不正确\n的是（ ）。", "options": {"A": "应同时将所有项目列为第一优先级", "B": "一组产生正现金流的项目，并不一定代表一家公司的总体最佳投资机会", "C": "一个组织在同一时间做太多的项目，并不能真正完成更多的工作", "D": "从商业角度看，一个预算超支的项目肯定是不划算的", "E": "从商业角度看，强迫项目团队接受不切实际的最后期限是极其有害的"}, "answer": ["A", "D"], "analysis": "本题考查的是价值交付。 价值驱动型项目管理应考虑以下商业价值因素： ① 从商业角度看，一个预算超支的项目有时却是划算的。 ② 一组产生正现金流的项目，并不一定代表一家公司的总体最佳投资机会。 ③ 从数学上讲，不可能同时将所有项目列为第一优先级。 ④ 一个组织在同一时间做太多的项目，并不能真正完成更多的工作。 ⑤ 从商业角度看，强迫项目团队接受不切实际的最后期限是极其有害的。"}, {"num": 76, "type": "multi", "question": "根据《标准施工招标文件》，评标委员会对投标报价进行的响应性评审\n内容有（ ）。", "options": {"A": "投标文件格式", "B": "投标有效期", "C": "投标保证金", "D": "已标价工程量清单", "E": "安全生产许可证"}, "answer": ["B", "C", "D"], "analysis": "根据《标准施工招标文件》，响应性评审内容包括投 标内容、工期、工程质量、投标有效期、投标保证金、权利义务、已标价工程量 清单、技术标准和要求等。"}, {"num": 77, "type": "multi", "question": "施工单位投标采用不平衡报价法时，可以适当提高报价的项目有（ ）。", "options": {"A": "工程内容说明不清楚的项目", "B": "暂定项目中必定要施工的不分标项目", "C": "单价与包干混合制合同中采用包干报价的项目", "D": "综合单价分析表中的材料费项目", "E": "预计开工后工程量会减少的项目"}, "answer": ["B", "C"], "analysis": "本题考查的是不平衡报价的适用情况。工程内容说明 不清楚的，可降低一些单价，在工程实施阶段通过索赔再寻求提高单价的机会， 故选项 A 错误。投标时可将综合单价分析表中的人工费及机械设备费报得高一 些，而材料费报得低一些，故选项 D 错误。对于将来工程量有可能减少的项目， 适当降低单价，故选项 E 错误。"}, {"num": 78, "type": "multi", "question": "关于监理人质量检查的说法，正确的是（ ）。", "options": {"A": "对承包人提供的材料和工程设备，承包人应会同监理人进行检验和交货验收", "B": "监理人对承包人的试验和检验结果有疑问，要求承包人重新检验时，由监理人和第三方检测机构共同进行", "C": "监理人对承包人已覆盖的隐蔽工程部分质量有疑问时，有权要求承包人对已覆盖的部位进行揭开重新检验", "D": "重新检验结果证明质量符合合同要求的，因此增加的费用由发包人和监理人共同承担", "E": "承包人自检确认的工程隐蔽部位具备覆盖条件后，监理人未按与承包人约定的时间进行检查且没有其他指示，承包人应自行完成覆盖工作，并拒绝监理人重新检查的要求"}, "answer": ["A", "C"], "analysis": "本题考查的是监理人质量检查。监理人对承包人的试 验和检验结果有疑问的，或为查清承包人试验和检验成果的可靠性要求承包人重 新试验和检验的，可按合同约定由监理人与承包人共同进行，故选项 B 错误。 经检验证明工程质量符合合同要求的，由发包人承担由此增加的费用和（或）工 期延误，并支付承包人合理利润，故选项 D 错误。监理人未按合同约定的时间 进行检查的，除监理人另有指示外，承包人可自行完成覆盖工作，并作相应记录 报送监理人，监理人应签字确认。监理人事后对检查记录有疑问的，可按合同约 定重新检查，故选项 E 错误。"}, {"num": 79, "type": "multi", "question": "关于承包人索赔的说法，正确的有（ ）。", "options": {"A": "承包人应在发出索赔意向通知书 28d 后，向监理人正式递交索赔报告", "B": "承包人应在知道或应当知道索赔事件发生后 28d 内，向监理人递交索赔意向通知书", "C": "在索赔事件影响结束后的 42d 内，承包人应向监理人递交最终索赔通知书", "D": "承包人接受索赔处理结果的，索赔款项应在竣工结算时进行支付", "E": "具有持续影响的索赔事件，承包人应按合理时间间隔持续递交延续索赔通知"}, "answer": ["B", "E"], "analysis": "本题考查的是承包人索赔。根据合同约定，承包人认 为有权得到追加付款和（或）延长工期的，应按以下程序向发包人提出索赔： （1）承包人应在知道或应当知道索赔事件发生后 28d 内，向监理人递交索 赔意向通知书，并说明发生索赔事件的事由，故选项 B 正确。 （2）承包人应在发出索赔意向通知书后 28d 内，向监理人正式递交索赔通 知书，故选项 A 错误。 （3）索赔事件具有连续影响的，承包人应按合理时间间隔继续递交延续索赔 通知，说明连续影响的实际情况和记录，列出累计的追加付款金额和（或）工期 延长天数，故选项E 正确。 （4）在索赔事件影响结束后的 28d 内，承包人应向监理人递交最终索赔通 知书，说明最终要求索赔的追加付款金额和延长的工期，并附必要的记录和证明 材料，故选项 C 错误。承包人接受索赔处理结果的，发包人应在作出索赔处理 结果答复后 28d 内完成赔付，故选项 D 错误。"}, {"num": 80, "type": "multi", "question": "根据《标准施工招标文件》，承包人可同时索赔工期和费用的情形有（ ）。", "options": {"A": "基准日后法律变化引起的价格调整", "B": "承包人遇到不利物质条件，监理人未发出指示", "C": "施工场地发掘文物、古迹", "D": "采取合同未约定的安全作业环境及安全施工措施", "E": "承包人遇到异常恶劣的气候条件"}, "answer": ["B", "C"], "analysis": "本题考查的是《标准施工招标文件》中合同条款规定 的可以合理补偿承包人索赔的条款。选项 A、D 只能索赔费用；选项 E 只能索 赔工期。"}, {"num": 81, "type": "multi", "question": "根据《建设工程施工专业分包合同（示范文本）》，下列情况视为分包\n人违约的有\n（ ）。", "options": {"A": "分包人与发包人或监理人发生直接工作联系", "B": "在分包合同施工中，发现技术要求存在错误、遗漏，通知承包人", "C": "分包人将其承包的分包工程转包或再分包", "D": "因分包人原因工程质量达不到约定的质量标准", "E": "为从事危险作业的职工办理意外伤害保险"}, "answer": ["A", "C", "D"], "analysis": "本题考查的是分包人违约。 当发生下列情况之一时，视为分包人违约： （1）分包人与发包人或监理人发生直接工作联系； （2）分包人将其承包的分包工程转包或再分包； （3）因分包人原因不能按照分包合同协议书约定的竣工日期或承包人同意顺 延的工期竣工； （4）因分包人原因工程质量达不到约定的质量标准； （5）分包人不履行分包合同义务或不按分包合同约定履行义务的其他情况。 选项 B、E 属于分包人的责任和义务。"}, {"num": 82, "type": "multi", "question": "采用缩短某项工作持续时间的方法来调整建设项目进度计划，说法正确\n的是（ ）。", "options": {"A": "改变非关键线路上有关工作的逻辑关系", "B": "优先压缩自由时差大的工作持续时间", "C": "有关工作的进度拖延时间不能超过总时差", "D": "可以采用增加资源投入措施", "E": "被压缩持续时间的工作位于超过计划工期的非关键线路上"}, "answer": ["D", "E"], "analysis": "本题考查的是施工进度计划调整方法及措施。通过压 缩某些工作的持续时间来缩短工期，这种调整方法的特点是不改变施工进度计划 中工作之间的逻辑关系，通过采取增加资源投入、提高劳动效率等措施，来缩短 某些工作的持续时间，以达到加快施工进度、缩短工期的目的。这些被压缩持续 时间的工作是位于关键线路和超过计划工期的非关键线路上的工作。同时，这些 工作又是其持续时间可被压缩的工作。这种施工进度计划的调整通常可利用工程 网络计划优化方法直接进行。"}, {"num": 83, "type": "multi", "question": "下列机械设备中，属于施工机具的有（ ）。", "options": {"A": "测量仪器", "B": "暖通设备", "C": "计量器具", "D": "智能控制设备", "E": "垂直运输设备"}, "answer": ["A", "C", "E"], "analysis": "本题考查的是机械设备。机械设备可分为两类： 一类是构成工程实体及配套的工艺设备和各类机具，如用于生产产品的设 备、电梯、智能控制及暖通设备等，这些机械设备作为工程实体的一部分，其质 量会直接影响工程质量； 另一类是指施工机具，即施工过程中使用的各类机械设备，如垂直运输设备， 各类操作工具、测量仪器和计量器具，各种施工安全设施等。"}, {"num": 84, "type": "multi", "question": "工程质量统计分析中，应用控制图分析判断生产过程是否处于稳定状态，\n可判断生产过程为异常的情形有（ ）。", "options": {"A": "点子几乎全部落在控制界线内", "B": "中心线一侧出现 7 点链", "C": "中心线两侧有 5 点连续上升", "D": "点子排列显示周期性变化", "E": "连续 11 点中有 10 点在同侧"}, "answer": ["B", "D", "E"], "analysis": "本题考查的是施工质量统计分析方法。选项 A 为稳 定状态的条件，故错误。选项 B，出现 7 点链，应判定工序异常，需采取处理 措施，故正确。选项 C，连续 7 点或 7点以上上升或下降排列才可判定生产过 程异常，故错误。选项 D，点子的排列显示周期性变化的现象时，即使所有点 子都在控制界限内，也应认为生产过程异常，故正确。选项E，连续 11 点中有 10 点在同侧，则可判定生产过程异常，故正确。"}, {"num": 85, "type": "multi", "question": "某工程施工过程中发生质量事故，造成10人死亡，轻伤140人，重伤10人，\n间接经济损失2.7亿，经查，该事故为施工单位施工员放低质量标准导致，则该\n事故为（ ）。", "options": {"A": "指导责任事故", "B": "操作责任事故", "C": "较大事故", "D": "重大事故", "E": "特别重大事故"}, "answer": ["A", "D"], "analysis": "施工员属于管理人员，所以为指导责任事故。本工程10 人死亡属于重大事故，轻伤、间接经济损失不计入；重伤、直接经济损失计入。"}, {"num": 86, "type": "multi", "question": "下列关于施工质量的影响的说法，正确的有（）。", "options": {"A": "质量问题会影响客户满意度和声誉", "B": "施工质量不达标不会增加监测和测试费用", "C": "施工低质量问题会增加修复和重建成本", "D": "质量问题可能导致施工过程的低效率和浪费", "E": "低质量的施工可能导致建筑物在使用过程中频繁需要维护和修理"}, "answer": ["A", "C", "D", "E"], "analysis": "选项 B 错误，施工质量不达标或低质量将增加修复 和重建成本、返工和修正成本、监测和测试费用、低效和浪费成本、维护和修理 成本，以及客户满意度和声誉成本。故选 ACDE。"}, {"num": 87, "type": "multi", "question": "某施工项目施工责任成本分解，以混凝土量盈利为控制目标，混凝土量\n盈利率大于或等于 2%，相关责任部门有（）。", "options": {"A": "技术部门", "B": "工程部门", "C": "商务部门", "D": "质量部门", "E": "项目管理机构"}, "answer": ["B", "C"], "analysis": "以混凝土量盈利为控制目标，混凝土量盈利率大于或等 于2%，相关责任部门是工程部门和商务部门，责任岗位是生产经理和商务经理。 故选BC。"}, {"num": 88, "type": "multi", "question": "下列关于施工过程中材料费控制的说法，正确的有（）。", "options": {"A": "可按工程部位实行限额领料", "B": "没有消耗定额的材料必须包干控制", "   currentIndex: 0,
  answers: {},         // { qNum: [selectedOptions] }
  submitted: false,
  timerSeconds: 0,
  timerInterval: null,
  paused: false,
  analysisVisible: false,
  redoQuestionNums: [],
  _autoAdvanceTimer: null,
};

// ============================================================
// MOBILE QUESTION NAV
// ============================================================
function buildMobileNav() {
  const grid = document.getElementById('mobileNavGrid');
  if (!grid) return;
  grid.innerHTML = '';
  ALL_QUESTIONS.forEach(q => {
    const dot = document.createElement('div');
    dot.className = 'mobile-nav-dot';
    dot.id = `mdot-${q.num}`;
    dot.textContent = q.num;
    dot.onclick = () => jumpToQuestion(q.num);
    grid.appendChild(dot);
  });
}

function updateMobileNavDots() {
  ALL_QUESTIONS.forEach(q => {
    const dot = document.getElementById(`mdot-${q.num}`);
    if (!dot) return;
    const currentQ = state.questions[state.currentIndex];
    dot.className = 'mobile-nav-dot';
    if (currentQ && currentQ.num === q.num) {
      dot.classList.add('current');
    } else if (state.submitted) {
      const result = getQuestionResult(q);
      if (result === 'correct') dot.classList.add('correct');
      else if (result === 'wrong') dot.classList.add('wrong');
      else if (result === 'partial') dot.classList.add('partial');
      else dot.classList.add('answered');
    } else if (state.answers[q.num]) {
      dot.classList.add('answered');
    }
  });
  const answeredCount = Object.keys(state.answers).length;
  const el = document.getElementById('mobileAnswered');
  if (el) el.textContent = answeredCount;
}

function toggleMobileNav() {
  const grid = document.getElementById('mobileNavGrid');
  if (!grid) return;
  grid.classList.toggle('show');
}

// ============================================================
// DYNAMIC TOPBAR PADDING
// ============================================================
function updateTopbarPadding() {
  const topBar = document.getElementById('topBar');
  const mainWrapper = document.querySelector('.main-wrapper');
  if (topBar && mainWrapper) {
    mainWrapper.style.paddingTop = topBar.offsetHeight + 'px';
  }
  // 根据屏幕宽度决定是否显示手机导航栏
  const navBar = document.querySelector('.mobile-nav-bar');
  if (navBar) {
    navBar.style.display = window.innerWidth <= 768 ? 'block' : 'none';
    // 在大屏隐藏时同时收起展开的题目网格
    if (window.innerWidth > 768) {
      const grid = document.getElementById('mobileNavGrid');
      if (grid) grid.classList.remove('show');
    }
  }
}

// ============================================================
// INIT
// ============================================================
window.onload = function() {
  state.questions = ALL_QUESTIONS;
  buildSidebar();
  buildMobileNav();

  // 动态计算顶部栏高度，确保内容不被遮挡
  updateTopbarPadding();
  window.addEventListener('resize', updateTopbarPadding);

  // Check localStorage for saved progress
  const saved = loadProgress();
  if (saved && !saved.submitted) {
    const answeredCount = Object.keys(saved.answers).length;
    const el = document.getElementById('resumeInfo');
    el.innerHTML = `已作答 <strong>${answeredCount}</strong> / 100 题<br>
      已用时 <strong>${formatTime(saved.timerSeconds)}</strong>`;
    document.getElementById('resumeBanner').classList.add('active');
  } else {
    startTimer();
    renderQuestion(0);
  }
};

// ============================================================
// TIMER
// ============================================================
function startTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    if (!state.paused && !state.submitted) {
      state.timerSeconds++;
      updateTimerDisplay();
      // Auto-save every 30s
      if (state.timerSeconds % 30 === 0) saveProgress();
    }
  }, 1000);
}

function updateTimerDisplay() {
  document.getElementById('timerDisplay').textContent = formatTime(state.timerSeconds);
}

function formatTime(s) {
  const h = Math.floor(s / 3600).toString().padStart(2, '0');
  const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${h}:${m}:${sec}`;
}

function togglePause() {
  state.paused = !state.paused;
  const overlay = document.getElementById('pauseOverlay');
  const btn = document.getElementById('pauseBtn');
  const timer = document.getElementById('timerDisplay');
  if (state.paused) {
    overlay.classList.add('active');
    btn.textContent = '▶ 继续';
    timer.classList.add('paused');
    saveProgress();
  } else {
    overlay.classList.remove('active');
    btn.innerHTML = '⏸ 暂停';
    timer.classList.remove('paused');
  }
}

// ============================================================
// LOCALSTORAGE PROGRESS
// ============================================================
const STORAGE_KEY = 'jianzao_exam_progress';

function saveProgress() {
  const data = {
    answers: state.answers,
    currentIndex: state.currentIndex,
    timerSeconds: state.timerSeconds,
    submitted: state.submitted,
    mode: state.mode,
    redoQuestionNums: state.redoQuestionNums,
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function clearProgress() {
  localStorage.removeItem(STORAGE_KEY);
}

function resumeProgress() {
  const saved = loadProgress();
  if (!saved) return;
  state.answers = saved.answers || {};
  state.currentIndex = saved.currentIndex || 0;
  state.timerSeconds = saved.timerSeconds || 0;
  state.submitted = saved.submitted || false;
  state.mode = saved.mode || 'exam';
  state.redoQuestionNums = saved.redoQuestionNums || [];

  if (state.mode === 'redo' && state.redoQuestionNums.length > 0) {
    state.questions = ALL_QUESTIONS.filter(q => state.redoQuestionNums.includes(q.num));
    document.getElementById('redoBanner').style.display = 'flex';
    document.getElementById('redoCount').textContent = state.questions.length;
  } else {
    state.questions = ALL_QUESTIONS;
  }

  document.getElementById('resumeBanner').classList.remove('active');
  updateTimerDisplay();
  startTimer();
  buildSidebar();
  updateSidebarDots();
  renderQuestion(state.currentIndex);
}

function startFresh() {
  clearProgress();
  state.answers = {};
  state.currentIndex = 0;
  state.timerSeconds = 0;
  state.submitted = false;
  state.mode = 'exam';
  state.questions = ALL_QUESTIONS;
  document.getElementById('resumeBanner').classList.remove('active');
  startTimer();
  buildSidebar();
  renderQuestion(0);
}

// ============================================================
// SIDEBAR
// ============================================================
function buildSidebar() {
  const sGrid = document.getElementById('singleGrid');
  const mGrid = document.getElementById('multiGrid');
  sGrid.innerHTML = '';
  mGrid.innerHTML = '';
  ALL_QUESTIONS.forEach(q => {
    const dot = document.createElement('div');
    dot.className = 'q-dot';
    dot.id = `dot-${q.num}`;
    dot.textContent = q.num;
    dot.onclick = () => jumpToQuestion(q.num);
    if (q.num <= 70) sGrid.appendChild(dot);
    else mGrid.appendChild(dot);
  });
}

function updateSidebarDots() {
  ALL_QUESTIONS.forEach(q => {
    const dot = document.getElementById(`dot-${q.num}`);
    if (!dot) return;
    const currentQ = state.questions[state.currentIndex];
    dot.className = 'q-dot';
    if (currentQ && currentQ.num === q.num) {
      dot.classList.add('current');
    } else if (state.submitted) {
      const result = getQuestionResult(q);
      if (result === 'correct') dot.classList.add('correct');
      else if (result === 'wrong') dot.classList.add('wrong');
      else if (result === 'partial') dot.classList.add('partial');
      else dot.classList.add('answered'); // unanswered
    } else if (state.answers[q.num]) {
      dot.classList.add('answered');
    }
  });
  updateMobileNavDots();
}

function jumpToQuestion(num) {
  const idx = state.questions.findIndex(q => q.num === num);
  if (idx >= 0) renderQuestion(idx);
}

// ============================================================
// RENDER QUESTION
// ============================================================
function renderQuestion(idx) {
  if (idx < 0 || idx >= state.questions.length) return;
  state.currentIndex = idx;
  state.analysisVisible = false;

  const q = state.questions[idx];
  const isMulti = q.type === 'multi';
  const selectedOptions = state.answers[q.num] || [];

  // Meta
  document.getElementById('qNum').textContent = q.num;
  const badge = document.getElementById('qTypeBadge');
  badge.textContent = isMulti ? '多选题' : '单选题';
  badge.className = 'q-type-badge ' + (isMulti ? 'multi' : 'single');
  document.getElementById('qScoreBadge').textContent = isMulti ? '2分' : '1分';

  // Question text
  document.getElementById('questionText').textContent = q.question;

  // Options
  const optList = document.getElementById('optionsList');
  optList.innerHTML = '';
  Object.entries(q.options).forEach(([key, val]) => {
    const item = document.createElement('div');
    item.className = 'option-item';
    item.id = `opt-${q.num}-${key}`;

    const letter = document.createElement('div');
    letter.className = 'option-letter';
    letter.textContent = key;

    const text = document.createElement('div');
    text.className = 'option-text';
    text.textContent = `${val}`;

    item.appendChild(letter);
    item.appendChild(text);

    if (selectedOptions.includes(key)) {
      item.classList.add('selected');
    }

    if (!state.submitted) {
      item.onclick = () => selectOption(q, key, item);
    } else {
      // Show correct/wrong
      applyResultStyle(item, key, q, selectedOptions);
    }

    optList.appendChild(item);
  });

  // Analysis box
  const analysisBox = document.getElementById('analysisBox');
  if (state.submitted) {
    analysisBox.style.display = 'block';
    showAnalysisContent(q, selectedOptions);
    document.getElementById('showAnalysisBtn').style.display = 'none';
  } else {
    analysisBox.style.display = 'none';
    document.getElementById('showAnalysisBtn').style.display = 'none';
  }

  // Progress
  const answeredCount = Object.keys(state.answers).length;
  const totalQ = ALL_QUESTIONS.length;
  document.getElementById('currentNum').textContent = `${q.num}`;
  document.getElementById('answeredCount').textContent = `已作答 ${answeredCount} 题`;
  document.getElementById('progressFill').style.width = `${(answeredCount / totalQ) * 100}%`;
  document.getElementById('progressText').children[0].innerHTML =
    `第 <strong>${idx + 1}</strong> / ${state.questions.length} 题`;

  // Nav buttons
  document.getElementById('prevBtn').disabled = idx === 0;
  const nextBtn = document.getElementById('nextBtn');
  if (idx === state.questions.length - 1 && !state.submitted) {
    nextBtn.textContent = '完成作答';
    nextBtn.className = 'btn btn-success';
    nextBtn.onclick = () => confirmSubmit();
  } else {
    nextBtn.textContent = '下一题 →';
    nextBtn.className = 'btn btn-primary';
    nextBtn.onclick = () => nextQuestion();
  }

  // Submit button in header
  document.getElementById('submitBtn').style.display =
    (!state.submitted && answeredCount > 0) ? 'inline-flex' : 'none';

  // Sidebar
  updateSidebarDots();

  // Scroll to top
  document.getElementById('contentArea').scrollTop = 0;
  window.scrollTo(0, 0);
}

function applyResultStyle(item, key, q, selectedOptions) {
  const isCorrect = q.answer.includes(key);
  const isSelected = selectedOptions.includes(key);

  if (isSelected && isCorrect) {
    item.classList.add('correct-answer');
  } else if (isSelected && !isCorrect) {
    item.classList.add('wrong-answer');
  } else if (!isSelected && isCorrect) {
    item.classList.add('missed-answer');
  }
}

// ============================================================
// SELECT OPTION
// ============================================================
function selectOption(q, key, itemEl) {
  if (state.submitted) return;
  const isMulti = q.type === 'multi';
  let selected = state.answers[q.num] ? [...state.answers[q.num]] : [];

  if (isMulti) {
    if (selected.includes(key)) {
      selected = selected.filter(k => k !== key);
      itemEl.classList.remove('selected');
      itemEl.querySelector('.option-letter').style = '';
    } else {
      selected.push(key);
      itemEl.classList.add('selected');
    }
  } else {
    // Single: deselect all others
    const allOpts = document.querySelectorAll(`[id^="opt-${q.num}-"]`);
    allOpts.forEach(el => {
      el.classList.remove('selected');
    });
    selected = [key];
    itemEl.classList.add('selected');
  }

  if (selected.length === 0) {
    delete state.answers[q.num];
  } else {
    state.answers[q.num] = selected;
  }

  // Update progress
  const answeredCount = Object.keys(state.answers).length;
  document.getElementById('answeredCount').textContent = `已作答 ${answeredCount} 题`;
  document.getElementById('progressFill').style.width =
    `${(answeredCount / ALL_QUESTIONS.length) * 100}%`;
  document.getElementById('submitBtn').style.display =
    answeredCount > 0 ? 'inline-flex' : 'none';

  updateSidebarDots();

  // Auto advance for single choice
  if (!isMulti) {
    state._autoAdvanceTimer = setTimeout(() => {
      state._autoAdvanceTimer = null;
      nextQuestion();
    }, 500);
  }
}

// ============================================================
// NAV
// ============================================================
function prevQuestion() {
  if (state._autoAdvanceTimer) {
    clearTimeout(state._autoAdvanceTimer);
    state._autoAdvanceTimer = null;
  }
  if (state.currentIndex > 0) renderQuestion(state.currentIndex - 1);
}
function nextQuestion() {
  if (state.currentIndex < state.questions.length - 1)
    renderQuestion(state.currentIndex + 1);
}

// ============================================================
// SUBMIT
// ============================================================
function confirmSubmit() {
  const answered = Object.keys(state.answers).length;
  const total = ALL_QUESTIONS.length;
  const unanswered = total - answered;
  let msg = '';
  if (unanswered > 0) {
    msg = `还有 ${unanswered} 题未作答，确定要提交吗？`;
  } else {
    msg = '所有题目已作答，确定提交试卷？';
  }
  if (confirm(msg)) submitExam();
}

function submitExam() {
  state.submitted = true;
  clearInterval(state.timerInterval);

  // Calculate scores
  const result = calculateScore();

  // Hide exam UI, show result
  document.getElementById('contentArea').style.display = 'none';
  document.getElementById('pauseBtn').style.display = 'none';
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('resultPage').style.display = 'block';

  document.getElementById('resultScore').textContent = result.total.toFixed(1);
  document.getElementById('timeUsed').textContent = `用时 ${formatTime(state.timerSeconds)}`;
  document.getElementById('stat-correct').textContent = result.correct;
  document.getElementById('stat-wrong').textContent = result.wrong;
  document.getElementById('stat-partial').textContent = result.partial;
  document.getElementById('stat-unanswered').textContent = result.unanswered;

  // Store redo list
  state.redoQuestionNums = result.wrongNums.concat(result.partialNums);

  clearProgress(); // clear saved progress after submit
  updateSidebarDots();
}

// ============================================================
// SCORING
// ============================================================
function calculateScore() {
  let total = 0;
  let correct = 0, wrong = 0, partial = 0, unanswered = 0;
  let wrongNums = [], partialNums = [];

  ALL_QUESTIONS.forEach(q => {
    const selected = state.answers[q.num] || [];
    if (selected.length === 0) {
      unanswered++;
      return;
    }

    const r = getQuestionResult(q);
    if (r === 'correct') {
      correct++;
      total += q.type === 'single' ? 1 : 2;
    } else if (r === 'partial') {
      partial++;
      const correctSelected = selected.filter(k => q.answer.includes(k));
      total += correctSelected.length * 0.5;
      partialNums.push(q.num);
    } else {
      wrong++;
      wrongNums.push(q.num);
    }
  });

  return { total, correct, wrong, partial, unanswered, wrongNums, partialNums };
}

function getQuestionResult(q) {
  const selected = state.answers[q.num] || [];
  if (selected.length === 0) return 'unanswered';
  const correct = q.answer;

  if (q.type === 'single') {
    return selected[0] === correct[0] ? 'correct' : 'wrong';
  } else {
    // Multi: check for any wrong selection
    const hasWrong = selected.some(k => !correct.includes(k));
    if (hasWrong) return 'wrong';
    const allCorrect = correct.every(k => selected.includes(k));
    if (allCorrect) return 'correct';
    return 'partial'; // no wrong, but missing some
  }
}

// ============================================================
// ANALYSIS
// ============================================================
function toggleAnalysis() {
  state.analysisVisible = !state.analysisVisible;
  const box = document.getElementById('analysisBox');
  box.style.display = state.analysisVisible ? 'block' : 'none';
  if (state.analysisVisible) {
    const q = state.questions[state.currentIndex];
    const selected = state.answers[q.num] || [];
    showAnalysisContent(q, selected);
  }
}

function showAnalysisContent(q, selected) {
  const r = getQuestionResult(q);
  const answerLine = document.getElementById('answerLine');
  const analysisText = document.getElementById('analysisText');

  let resultTag = '';
  if (r === 'correct') resultTag = `<span class="ans-right">✓ 正确</span>`;
  else if (r === 'partial') resultTag = `<span class="ans-partial">△ 少选得分</span>`;
  else if (r === 'unanswered') resultTag = `<span style="color:var(--text-muted)">— 未作答</span>`;
  else resultTag = `<span class="ans-wrong">✗ 错误</span>`;

  answerLine.innerHTML =
    `<span class="ans-correct">正确答案：${q.answer.join('')}</span>
     &nbsp;&nbsp;
     <span class="ans-your">你的选择：${selected.join('') || '—'}</span>
     &nbsp;${resultTag}`;

  analysisText.textContent = q.analysis;
}

// ============================================================
// ERROR ANALYSIS
// ============================================================
function showErrorAnalysis() {
  const section = document.getElementById('errorAnalysisSection');
  section.style.display = section.style.display === 'none' ? 'block' : 'none';
  if (section.style.display === 'none') return;

  const list = document.getElementById('errorList');
  list.innerHTML = '';

  const errors = ALL_QUESTIONS.filter(q => {
    const r = getQuestionResult(q);
    return r === 'wrong' || r === 'partial' || r === 'unanswered';
  });

  document.getElementById('errorCountLabel').textContent = `共 ${errors.length} 题`;

  if (errors.length === 0) {
    list.innerHTML = '<p style="color:var(--success); text-align:center; padding:20px;">🎉 恭喜！全部答对！</p>';
    return;
  }

  errors.forEach(q => {
    const selected = state.answers[q.num] || [];
    const r = getQuestionResult(q);

    const item = document.createElement('div');
    item.className = 'error-item';

    let statusBadge = '';
    if (r === 'partial') statusBadge = `<span class="partial-badge">少选</span>`;
    else if (r === 'unanswered') statusBadge = `<span class="partial-badge" style="background:var(--bg-card);color:var(--text-muted);border:1px solid var(--border)">未答</span>`;

    item.innerHTML = `
      <div class="error-q-header">
        <div class="error-q-num">${q.num}</div>
        <div class="error-q-text">
          <strong>[${q.type === 'multi' ? '多选' : '单选'}]</strong>${statusBadge}
          ${q.question}
        </div>
      </div>
      <div class="error-options" id="errOpts-${q.num}"></div>
      <div class="error-analysis">
        <strong>✓ 正确答案：${q.answer.join('')}</strong>　
        <strong>你的选择：${selected.join('') || '—'}</strong><br><br>
        ${q.analysis}
      </div>
    `;

    list.appendChild(item);

    const optsEl = document.getElementById(`errOpts-${q.num}`);
    Object.entries(q.options).forEach(([key, val]) => {
      const isCorrect = q.answer.includes(key);
      const wasSelected = selected.includes(key);
      const div = document.createElement('div');
      div.className = 'error-opt';
      if (isCorrect) div.classList.add('is-correct');
      if (wasSelected && !isCorrect) div.classList.add('was-selected');
      let icon = '';
      if (isCorrect && wasSelected) icon = '✓';
      else if (isCorrect) icon = '○';
      else if (wasSelected) icon = '✗';
      else icon = '·';
      div.textContent = `${icon} ${key}. ${val}`;
      optsEl.appendChild(div);
    });
  });
}

// ============================================================
// REDO MODE
// ============================================================
function startRedoMode() {
  const toRedo = ALL_QUESTIONS.filter(q => {
    const r = getQuestionResult(q);
    return r === 'wrong' || r === 'partial' || r === 'unanswered';
  });

  if (toRedo.length === 0) {
    alert('没有需要重做的题目，全部答对了！');
    return;
  }

  if (!confirm(`将重做 ${toRedo.length} 道错题，确定？`)) return;

  // Reset answers for these questions only
  toRedo.forEach(q => { delete state.answers[q.num]; });
  state.redoQuestionNums = toRedo.map(q => q.num);
  state.questions = toRedo;
  state.currentIndex = 0;
  state.submitted = false;
  state.mode = 'redo';
  state.timerSeconds = 0;
  state.paused = false;

  // Show exam UI
  document.getElementById('contentArea').style.display = 'block';
  document.getElementById('resultPage').style.display = 'none';
  document.getElementById('pauseBtn').style.display = 'inline-flex';

  // Show redo banner
  document.getElementById('redoBanner').style.display = 'flex';
  document.getElementById('redoCount').textContent = toRedo.length;

  startTimer();
  buildSidebar();
  renderQuestion(0);
}

// ============================================================
// RESTART
// ============================================================
function restartAll() {
  if (!confirm('确定要重新开始全部题目吗？')) return;
  clearProgress();
  state = {
    mode: 'exam',
    questions: ALL_QUESTIONS,
    currentIndex: 0,
    answers: {},
    submitted: false,
    timerSeconds: 0,
    timerInterval: null,
    paused: false,
    analysisVisible: false,
    redoQuestionNums: [],
  };
  document.getElementById('contentArea').style.display = 'block';
  document.getElementById('resultPage').style.display = 'none';
  document.getElementById('pauseBtn').style.display = 'inline-flex';
  document.getElementById('redoBanner').style.display = 'none';
  document.getElementById('errorAnalysisSection').style.display = 'none';
  startTimer();
  buildSidebar();
  renderQuestion(0);
}

// ============================================================
// PAGE VISIBILITY (auto pause when tab hidden)
// ============================================================
document.addEventListener('visibilitychange', () => {
  if (document.hidden && !state.paused && !state.submitted) {
    saveProgress();
  }
});

// Auto save before unload
window.addEventListener('beforeunload', () => {
  if (!state.submitted) saveProgress();
});
</script>
